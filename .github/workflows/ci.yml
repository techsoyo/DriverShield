name: DriverShield CI

# Dispara en todo PR hacia main y en push directo a main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancela runs anteriores del mismo PR al recibir nuevo push
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─────────────────────────────────────────────
  # JOB 1: Lint de estilo (ktlint)
  # ─────────────────────────────────────────────
  lint:
    name: Ktlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run ktlint
        run: ./gradlew ktlintCheck

      - name: Upload ktlint report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: ktlint-report
          path: '**/build/reports/ktlint/**'
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 2: Tests unitarios
  # ─────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: '**/build/reports/tests/**'
          retention-days: 7

      - name: Publish test report (PR comment)
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: '**/build/test-results/testDebugUnitTest/**.xml'
          check_name: 'Unit Test Results'

  # ─────────────────────────────────────────────
  # JOB 3: Build debug
  # ─────────────────────────────────────────────
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 4: Security Review con Claude
  # DESACTIVADO temporalmente (requiere ANTHROPIC_API_KEY en GitHub Secrets)
  # Para activar: Settings → Secrets → Actions → New secret → ANTHROPIC_API_KEY
  # Revisión manual de seguridad: usar el Skill qa-tester.md antes de cada PR
  # ─────────────────────────────────────────────
  # security-review:
  #   name: Security Review (Claude)
  #   runs-on: ubuntu-latest
  #   needs: build
  #   if: github.event_name == 'pull_request'
  #   permissions:
  #     pull-requests: write
  #     contents: read
  #   steps:
  #     - name: Checkout
  #       uses: actions/checkout@v4
  #
  #     - name: Claude Security Review
  #       uses: anthropics/claude-code-security-review@v1
  #       with:
  #         anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
  #         # Detecta: SQL injection, auth débil, datos sensibles, lógica insegura
  #         # Deja comentarios directamente en el PR

  # ─────────────────────────────────────────────
  # JOB 5: Release Please
  # Solo en push a main (después de merge de PR)
  # ─────────────────────────────────────────────
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Release Please Action
        uses: googleapis/release-please-action@v4
        with:
          release-type: simple
          # Lee los commits con formato Conventional Commits para:
          # → Actualizar CHANGELOG.md
          # → Proponer bump de versión (feat → minor, fix → patch)
          # → Crear tag vX.Y.Z y GitHub Release automáticamente